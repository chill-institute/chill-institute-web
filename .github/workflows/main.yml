name: Main

on:
  push:
    branches:
      - main

jobs:
  verify:
    concurrency:
      group: web-main-verify-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: "0.1.14"
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Run core verify checks
        run: vp run verify

      - name: Upload chill build artifact
        uses: actions/upload-artifact@v7
        with:
          name: chill-dist
          path: apps/chill/dist
          if-no-files-found: error

      - name: Upload binge build artifact
        uses: actions/upload-artifact@v7
        with:
          name: binge-dist
          path: apps/binge/dist
          if-no-files-found: error

  e2e:
    needs: verify
    concurrency:
      group: web-main-e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Download binge build artifact
        uses: actions/download-artifact@v8
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: "0.1.14"
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-e2e
          path: |
            apps/chill/playwright-report
            apps/chill/test-results
            apps/binge/playwright-report
            apps/binge/test-results
          if-no-files-found: ignore

  deploy:
    needs: [verify, e2e]
    if: ${{ needs.verify.result == 'success' && needs.e2e.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download chill build artifact
        uses: actions/download-artifact@v8
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Download binge build artifact
        uses: actions/download-artifact@v8
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Deploy chill production to Cloudflare Pages
        id: deploy_chill
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: chill-institute
          dist-dir: apps/chill/dist
          branch: main

      - name: Deploy binge production to Cloudflare Pages
        id: deploy_binge
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: binge-institute
          dist-dir: apps/binge/dist
          branch: main

      - name: Publish summary
        run: |
          {
            echo "## Web deploy"
            echo
            echo "- Environment: \`production\`"
            echo "- Chill: [https://chill.institute](https://chill.institute)"
            echo "- Binge: [https://binge.institute](https://binge.institute)"
            echo "- Flow: \`push Main workflow\`"
          } >> "${GITHUB_STEP_SUMMARY}"
