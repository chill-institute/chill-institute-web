name: Verify

on:
  pull_request:

concurrency:
  group: web-verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: "0.1.14"
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Run core verify checks
        run: vp run verify

      - name: Upload chill build artifact
        uses: actions/upload-artifact@v7
        with:
          name: chill-dist
          path: apps/chill/dist
          if-no-files-found: error

      - name: Upload binge build artifact
        uses: actions/upload-artifact@v7
        with:
          name: binge-dist
          path: apps/binge/dist
          if-no-files-found: error

  e2e:
    needs: verify
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Download binge build artifact
        uses: actions/download-artifact@v8
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: "0.1.14"
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-e2e
          path: |
            apps/chill/playwright-report
            apps/chill/test-results
            apps/binge/playwright-report
            apps/binge/test-results
          if-no-files-found: ignore

  deploy-preview:
    needs: [verify, e2e]
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    concurrency:
      group: web-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download chill build artifact
        uses: actions/download-artifact@v8
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Download binge build artifact
        uses: actions/download-artifact@v8
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Deploy chill preview to Cloudflare Pages
        id: deploy_chill_preview
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: chill-institute
          dist-dir: apps/chill/dist
          branch: ${{ github.head_ref }}

      - name: Deploy binge preview to Cloudflare Pages
        id: deploy_binge_preview
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: binge-institute
          dist-dir: apps/binge/dist
          branch: ${{ github.head_ref }}

      - name: Publish summary
        env:
          PREVIEW_BRANCH: ${{ github.head_ref }}
          CHILL_PREVIEW_URL: ${{ steps.deploy_chill_preview.outputs.pages-deployment-alias-url || steps.deploy_chill_preview.outputs.deployment-url }}
          BINGE_PREVIEW_URL: ${{ steps.deploy_binge_preview.outputs.pages-deployment-alias-url || steps.deploy_binge_preview.outputs.deployment-url }}
        run: |
          {
            echo "## Web preview deploy"
            echo
            echo "- Branch: \`${PREVIEW_BRANCH}\`"
            echo "- Chill: [${CHILL_PREVIEW_URL}](${CHILL_PREVIEW_URL})"
            echo "- Binge: [${BINGE_PREVIEW_URL}](${BINGE_PREVIEW_URL})"
          } >> "${GITHUB_STEP_SUMMARY}"
